<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-feelio.png" />
    <link rel="apple-touch-icon" href="/icon-feelio.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>feelio</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Surfaces startup errors that happen before React mounts (module-eval /
      // failed imports) — otherwise they leave a silent white screen.
      ;(function () {
        function show(title, detail) {
          var root = document.getElementById('root')
          if (!root || root.getAttribute('data-mounted') === '1' || root.children.length) return
          root.innerHTML =
            '<pre style="white-space:pre-wrap;word-break:break-word;padding:1rem;margin:0;' +
            'font:13px/1.5 ui-monospace,Menlo,Consolas,monospace;color:#9b0f06;">' +
            title +
            '\n\n' +
            detail +
            '</pre>'
        }
        window.addEventListener('error', function (e) {
          show(
            'Startup error',
            (e.message || '') + '\n' + ((e.error && e.error.stack) || e.filename || ''),
          )
        })
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason || {}
          show('Startup promise rejection', r.stack || r.message || String(r))
        })
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
